<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Todo • Modern</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container app-container">
    <header class="topbar card">
      <div class="brand">
        <div class="logo">✓</div>
        <div>
          <div class="brand-title">Todo</div>
          <div class="brand-sub">Minimal • Modern</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="btn btn-ghost">Toggle Theme</button>
      </div>
    </header>

    <section class="top-add-wrap">
      <section class="card add-task-card">
        <form id="add-form" class="add-task-form">
          <input id="todo-input" name="todo" placeholder="Title" required autocomplete="off">
          <input id="todo-desc" name="description" placeholder="Short description (optional)" autocomplete="off">
          <input id="todo-tags" name="tags" placeholder="Tags (comma separated)" autocomplete="off">
          <select id="todo-priority" name="priority" aria-label="Priority">
            <option value="2">Medium</option>
            <option value="1">High</option>
            <option value="3">Low</option>
          </select>
          <input id="todo-due" name="due_date" type="date" aria-label="Due date">
          <button type="submit" class="btn primary">Add Task</button>
        </form>
      </section>
    </section>

    <main class="main-grid">
      <section class="card tasks">
        <div class="tasks-toolbar">
          <input id="search-input" class="field" placeholder="Search tasks...">
          <select id="sort-select" class="field field-select">
            <option value="created_at">Sort: Created</option>
            <option value="due_date">Sort: Due Date</option>
            <option value="priority">Sort: Priority</option>
            <option value="title">Sort: Title</option>
          </select>
          <select id="order-select" style="padding:10px 12px;border-radius:10px;border:1px solid rgba(15,23,36,0.06);background:var(--input-bg)">
            <option value="desc">Desc</option>
            <option value="asc">Asc</option>
          </select>
        </div>
        <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
          <select id="priority-filter" style="padding:10px 12px;border-radius:10px;border:1px solid rgba(15,23,36,0.06);background:var(--input-bg)">
            <option value="">Priority: All</option>
            <option value="1">Priority: High</option>
            <option value="2">Priority: Medium</option>
            <option value="3">Priority: Low</option>
          </select>
          <select id="due-filter" style="padding:10px 12px;border-radius:10px;border:1px solid rgba(15,23,36,0.06);background:var(--input-bg)">
            <option value="">Due: Any</option>
            <option value="overdue">Due: Overdue</option>
            <option value="today">Due: Today</option>
            <option value="this_week">Due: This Week</option>
          </select>
          <select id="tag-filter" style="padding:10px 12px;border-radius:10px;border:1px solid rgba(15,23,36,0.06);background:var(--input-bg)">
            <option value="">Tag: All</option>
          </select>
        </div>
        <div class="filters" id="filters"><button class="filter active" data-filter="all">All</button><button class="filter" data-filter="active">Active</button><button class="filter" data-filter="completed">Completed</button></div>
        <ul id="task-list" class="task-list" aria-live="polite"></ul>
        <div class="empty-state" id="empty-state">No tasks — add your first task</div>
      </section>
    </main>

    <aside class="card right-column info-panel">
      <div class="greeting">Today</div>
      <div class="muted">Task dashboard</div>
      <div class="stat-row"><span>Total</span><strong id="stat-total">0</strong></div>
      <div class="stat-row"><span>Completed</span><strong id="stat-completed">0</strong></div>
      <div class="stat-row"><span>Overdue</span><strong id="stat-overdue">0</strong></div>
      <div class="stat-row"><span>Last 7 days</span><strong id="stat-last7">0</strong></div>
      <div class="spacer-sm"></div>
      <button id="clear-all" class="btn btn-ghost danger">Clear All</button>
    </aside>

    <script src="/static/js/app.js"></script>
  </div>
</body>
</html>
